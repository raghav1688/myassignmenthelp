name: LLM Citation Tracking Loop

on:
  schedule:
    - cron: '0 0 * * 1' # Automates the script to run every single Monday at midnight UTC
  workflow_dispatch: # Adds a manual "Run" button to your dashboard so you can test it anytime

jobs:
  run-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
      

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Audit Script Safely
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python tracker_script.py
